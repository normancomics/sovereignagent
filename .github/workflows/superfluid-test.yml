name: Superfluid Test

on:
  workflow_dispatch: {}

jobs:
  superfluid-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Superfluid test script
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          CHAIN_ID: ${{ secrets.CHAIN_ID }}
          SUPER_TOKEN: ${{ secrets.SUPER_TOKEN }}
          SOVEREIGN_AGENT_ADDRESS: ${{ secrets.SOVEREIGN_AGENT_ADDRESS }}
          PHANTOM_OPERATOR_ADDRESS: ${{ secrets.PHANTOM_OPERATOR_ADDRESS || secrets.SOVEREIGN_AGENT_ADDRESS }}
          FLOW_RATE: ${{ secrets.FLOW_RATE }}
        run: node test.js
